<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 130" width="420" height="130" role="img" aria-label="EcoGuard Ifrane">
  <title>EcoGuard</title>
  <defs>
    <clipPath id="shield-clip">
      <path d="M0 0 L56 0 L56 74 Q56 104 28 118 Q0 104 0 74 Z"/>
    </clipPath>
  </defs>

  <!-- Shield mark -->
  <g transform="translate(16, 6)">
    <path d="M28 2 L54 14 L54 74 Q54 102 28 116 Q2 102 2 74 L2 14 Z" fill="#0d4a2e"/>
    <g clip-path="url(#shield-clip)">
      <rect x="0" y="0" width="56" height="52" fill="#0a3626"/>
      <polygon points="28,12 8,52 48,52" fill="#0f5c38"/>
      <polygon points="28,12 22,26 34,26" fill="#e4f2ec" opacity="0.9"/>
      <rect x="0" y="52" width="56" height="66" fill="#082e1c"/>
      <rect x="25" y="90" width="6" height="16" fill="#061a0e"/>
      <polygon points="28,54 14,76 42,76" fill="#0f6637"/>
      <polygon points="28,44 15,64 41,64" fill="#158a48"/>
      <polygon points="28,34 16,52 40,52" fill="#1ba358"/>
      <polygon points="28,24 18,42 38,42" fill="#22c06c"/>
    </g>
    <path d="M28 2 L54 14 L54 74 Q54 102 28 116 Q2 102 2 74 L2 14 Z"
          fill="none" stroke="#1e9456" stroke-width="1.8" stroke-linejoin="round" opacity="0.6"/>
  </g>

  <!-- Wordmark -->
  <text y="88" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="72" font-weight="700" letter-spacing="-2">
    <tspan x="88" fill="#1a9e60">Eco</tspan><tspan fill="#0d3d2a">Guard</tspan>
  </text>

  <!-- Ifrane label -->
  <text x="92" y="112"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="11" font-weight="400" letter-spacing="4.5" fill="#4a9070">IFRANE</text>
</svg>
